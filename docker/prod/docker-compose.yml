services:
  nginx:
    image: nginx:1.27-alpine
    container_name: instrument-shop-prod-nginx
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data_prod:/app/staticfiles:ro
      - media_data_prod:/app/media:ro
    networks:
      - instrument-shop-network

  web:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    container_name: instrument-shop-prod-web
    command: sh -c "python manage.py collectstatic --noinput && gunicorn instrument_shop.asgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 120"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: instrument_shop.settings
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data_prod:/app/staticfiles
      - media_data_prod:/app/media
    networks:
      - instrument-shop-network

  db:
    image: postgres:17
    container_name: instrument-shop-prod-db
    env_file:
      - .env
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - instrument-shop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data_prod:
  static_data_prod:
  media_data_prod:

networks:
  instrument-shop-network:
    driver: bridge
