services:
  web:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    container_name: instrument-shop-dev-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - ../..:/app:cached
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: instrument_shop.settings
    depends_on:
      db:
        condition: service_healthy
    networks:
      - instrument-shop-network

  db:
    image: postgres:17
    container_name: instrument-shop-dev-db
    env_file:
      - .env
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - instrument-shop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data_dev:

networks:
  instrument-shop-network:
    driver: bridge
